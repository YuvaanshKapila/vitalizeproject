name: Package interview

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          chmod +x scripts/package-interview.sh
          VERSION="$(date +%Y%m%d)-${GITHUB_SHA::7}"
          OUTPUT_DIR="$RUNNER_TEMP" ./scripts/package-interview.sh "$VERSION"
          echo "ZIP_PATH=$RUNNER_TEMP/vitalize-interview-${VERSION}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: vitalize-interview-${{ github.sha }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 90
